name: Deploy Frontend

# Single-job build + deploy through this project's deploy.sh wrapper.
# Production uses a fixed DotNS domain so installed hosts and shared links stay
# stable across releases; PR previews get a pr<N>- prefix on the same base.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Force redeploy (skip cache)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-admin-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm bug #4828: lockfiles generated on macOS can omit Linux optional
        # native packages. Resolve fresh on the runner so Rollup/PAPI native
        # packages are present for this platform.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Setup IPFS
        uses: ipfs/download-ipfs-distribution-action@v1
        with:
          name: kubo
          version: v0.33.0

      - name: Initialize IPFS repo
        run: ipfs init

      - name: Install deploy tool
        run: npm install -g bulletin-deploy@latest

      - name: Deploy admin app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              DOMAIN="pr${{ github.event.pull_request.number }}-w3spayadmin01.dot"
            else
              DOMAIN="w3spayadmin01.dot"
            fi
            ./deploy.sh "$DOMAIN"
        env:
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          BULLETIN_ENV: paseo-next-v2
          VITE_NETWORK: ${{ vars.VITE_NETWORK || 'paseo-next-v2' }}
          VITE_W3SPAY_REGISTRY_ADDRESS: ${{ vars.VITE_W3SPAY_REGISTRY_ADDRESS || '0x70f6a449d770931419cfa8d8412e3a5d6377e905' }}
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Comment on PR
        if: github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const domain = `pr${{ github.event.pull_request.number }}-w3spayadmin01`;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**${domain}.dot** · [logs](${runUrl})\n\nhttps://${domain}.dot.li`
            });
