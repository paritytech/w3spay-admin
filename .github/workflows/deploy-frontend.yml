name: Deploy Frontend

# Mirrors p2p-market/.github/workflows/deploy-frontend.yml — single-job build
# + deploy with bulletin-deploy and a retry wrapper. Production points at a
# FIXED `w3spayadmin.dot` domain so cached desktop installs and shared
# links never break across releases; PR previews ride a `pr<N>-` prefix on
# the same base so they are collision-free regardless of PR number.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Force redeploy (skip cache)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm bug #4828: a lockfile generated on macOS pins macOS-only
        # variants of optional native modules (e.g.
        # `@rollup/rollup-darwin-arm64`) and never lists the Linux
        # equivalents. Both `npm ci` and `npm install` then honor the
        # lockfile and skip `@rollup/rollup-linux-x64-gnu`, which vite
        # imports via rollup. The fix npm itself recommends in the error
        # message: delete the lockfile and let `npm install` resolve fresh
        # for this platform. CI doesn't commit the lockfile so the drift
        # is throwaway.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          # VITE_* are baked into the JS bundle at build — must live on
          # this step, not on Deploy (where they'd be a no-op).
          VITE_W3SPAY_ADMIN_SENTRY_DSN: ${{ secrets.VITE_W3SPAY_ADMIN_SENTRY_DSN }}
          # Pin the target network + deployed registry address explicitly so
          # CI never silently falls back to a stale config.ts default. Update
          # the address here whenever the contract is re-deployed.
          VITE_NETWORK: paseo-next-v2
          VITE_W3SPAY_REGISTRY_ADDRESS: ${{ secrets.VITE_W3SPAY_REGISTRY_ADDRESS }}

      - name: Copy manifest
        # bulletin-deploy publishes the manifest separately via publishManifest;
        # it needs manifest.toml alongside the built assets in dist/.
        run: cp bundle/manifest.toml dist/manifest.toml

      - name: Setup IPFS
        uses: ipfs/download-ipfs-distribution-action@v1
        with:
          name: kubo
          version: v0.33.0
      - run: ipfs init

      - name: Install deploy tool
        run: npm install -g bulletin-deploy@latest

      - name: Deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          # Paseo Next v2 DotNS rule (dev signers, no PoP): label = ≥9
          # alphanumeric chars + 2 trailing digits. Production label is the
          # stable one; PR previews use a `pr<N>-` prefix so the trailing
          # `01` stays at the end and counts as the 2 trailing digits.
          # Same shape as p2p-market's `pr<N>-localdott33.dot`.
          command: |
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              DOMAIN="pr${{ github.event.pull_request.number }}-w3spayadmin.dot"
            else
              DOMAIN="w3spayadmin.dot"
            fi
            # bulletin-deploy.config.ts reads the manifest `domain` from
            # BULLETIN_DEPLOY_DOMAIN and aborts publishManifest if it doesn't
            # match the deploy domain. The CLI doesn't set it (only the
            # interactive deploy.sh does), so thread the same value in here —
            # otherwise the config falls back to its default domain and
            # publishManifest fails with exit 78 after the upload already
            # succeeded.
            export BULLETIN_DEPLOY_DOMAIN="$DOMAIN"
            bulletin-deploy --env paseo-next-v2 './dist' "$DOMAIN"
        env:
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Comment on PR
        if: github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const domain = `pr${{ github.event.pull_request.number }}-w3spayadmin`;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**${domain}.dot** · [logs](${runUrl})\n\nhttps://${domain}.dot.li`
            });
